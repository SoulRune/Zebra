name: Build Zebra

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
        token: ${{ secrets.GIT_TOKEN }}

    - name: Install Theos Dependencies
      run: brew install ldid fakeroot make cmake gettext gnutls lz4 zstd libgcrypt libgpg-error xxhash

    - name: Install Theos
      uses: actions/checkout@v2
      with:
        repository: theos/theos
        path: theos
        submodules: recursive

    - name: Build libapt
      run: Vendor/Plains/Vendor/build-libapt.sh

    - name: Build Package
      env:
        THEOS: theos
      run: gmake package
